<!DOCTYPE html>
<html>
<head>
    <title>Live Counter</title>

    <style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #FBFCF8;
    padding: 40px;
}

.container {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    width: 220px;
    padding: 25px;
    border-radius: 20px;
    color: white;
    text-align: center;

    box-shadow:
        0 8px 20px rgba(0,0,0,0.15);

    transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
}

.card:hover {
    transform: translateY(-5px);

    box-shadow:
        0 12px 24px rgba(0,0,0,0.2);
}

.card h2 {
    margin: 0;
    font-size: 1.2rem;
    opacity: 0.9;
}

.card h1 {
    margin-top: 15px;
    font-size: 4rem;
}

/* Individual Colors */

.events-card {
    background: linear-gradient(
        135deg,
        #ff6b6b,
        #ff8e53
    );
}

.outreach-card {
    background: linear-gradient(
        135deg,
        #4facfe,
        #00f2fe
    );
}

.participants-card {
    background: linear-gradient(
        135deg,
        #43e97b,
        #38f9d7
    );
}

.volunteers-card {
    background: linear-gradient(
        135deg,
        #a18cd1,
        #fbc2eb
    );
}

</style>
</head>

<body>

<div class="container">

    <div class="card events-card">
        <h2>Events & Workshops Hosted</h2>
        <h1 id="events">0</h1>
    </div>

    <div class="card outreach-card">
        <h2>Community Outreach Activities</h2>
        <h1 id="outreach">0</h1>
    </div>

    <div class="card participants-card">
        <h2>Student Participants Reached</h2>
        <h1 id="participants">0</h1>
    </div>

    <div class="card volunteers-card">
        <h2>Youth Volunteers Involved</h2>
        <h1 id="volunteers">0</h1>
    </div>

</div>

<!-- <button id="incrementBtn">
    Increase Counter
</button> -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue,
    runTransaction
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBGwrqSDznrB1xnZOTn9_YwV5zit9HHSlE",
  authDomain: "js-counter-196a8.firebaseapp.com",
  databaseURL: "https://js-counter-196a8-default-rtdb.firebaseio.com",
  projectId: "js-counter-196a8",
  storageBucket: "js-counter-196a8.firebasestorage.app",
  messagingSenderId: "852835245215",
  appId: "1:852835245215:web:aaa12138081ac9ba6116aa"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const eventsRef = ref(db, "events");
const outreachRef = ref(db, "outreach");
const participantsRef = ref(db, "participants");
const volunteersRef = ref(db, "volunteers");

const eventsElement =
    document.getElementById("events");
const outreachElement =
    document.getElementById("outreach");
const participantsElement =
    document.getElementById("participants");
const volunteersElement =
    document.getElementById("volunteers");

    

// const button =
//     document.getElementById("incrementBtn");

onValue(eventsRef, (snapshot) => {
    eventsElement.innerText = snapshot.val();
});

onValue(outreachRef, (snapshot) => {
    outreachElement.innerText = snapshot.val();
});

onValue(participantsRef, (snapshot) => {
    participantsElement.innerText = snapshot.val();
});

onValue(volunteersRef, (snapshot) => {
    volunteersElement.innerText = snapshot.val();
});

// button.addEventListener("click", () => {

//     runTransaction(counterRef, (currentValue) => {
//         return (currentValue || 0) + 1;
//     });

// });

</script>

</body>
</html>
